site_name: Python Fragments
repo_url: https://github.com/TheRunningAlgorithm2/python-fragments
repo_name: Python Fragments
theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/logo.svg
  palette:
    scheme: slate
  features:
    - search.suggest
    - search.highlight
    - search.share

plugins:
  - search:
      separator: '[\s\-\.]+'

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra_css:
  - extras.css

nav:
  - Introduction: index.md
  - Getting Started:
    - Checklist: getting-started/checklist.md
    - Installation: getting-started/installation.md
    - VS Code: getting-started/vs-code.md
    - LSP: getting-started/lsp.md
  - Transpiler:
    - 1. Transpilation: transpiler/transpilation.md
    - 2. HTML Library: transpiler/html-library.md
    - 3. Import Hook: transpiler/import-hook.md
  - Syntax:
    - Fragments: syntax/fragments.md
    - Attributes: syntax/attributes.md
    - Control Flow: syntax/control-flow.md
    - Components: syntax/components.md
  - Examples:
    - FastAPI: examples/fastapi.md
